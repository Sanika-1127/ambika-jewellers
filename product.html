<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details</title>

<style>
* {
  box-sizing: border-box;
}

body {
  font-family: Arial;
  margin: 0;
  background: #eaeaea;

  /* ✅ center on desktop */
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* 🔥 MAIN CARD */
.container {
  display: flex;
  max-width: 900px;
  width: 100%;
  margin: 20px;
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 0 12px rgba(0,0,0,0.1);
  overflow: hidden;
}

/* IMAGE */
.image-box {
  flex: 1;
}

.image-box img {
  width: 100%;
  height: 100%;
  min-height: 300px;
  object-fit: cover;
}

/* DETAILS */
.details {
  flex: 1;
  padding: 20px;

  display: flex;
  flex-direction: column;
  justify-content: center;
}

h2 {
  margin: 0 0 10px;
  font-size: 24px;
}

p {
  margin: 6px 0;
  color: #444;
}

/* PRICE BOX */
.price-box {
  background: #f9f9f9;
  padding: 15px;
  border-radius: 8px;
  margin-top: 10px;
  line-height: 1.6;
  font-size: 15px;
}

/* BUTTON */
button {
  margin-top: 20px;
  padding: 14px;
  width: 100%;
  border: none;
  background: linear-gradient(45deg, #25D366, #1ebe5d);
  color: white;
  font-size: 16px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

/* 🔥 MOBILE */
@media (max-width: 768px) {

  body {
    align-items: flex-start;
  }

  .container {
    flex-direction: column;
    margin: 10px;
  }

  .image-box img {
    height: 260px;
  }

  .details {
    padding: 15px;
  }

  h2 {
    font-size: 20px;
  }

  .price-box {
    font-size: 14px;
  }
}

/* 🔥 SMALL MOBILE */
@media (max-width: 480px) {

  .image-box img {
    height: 200px;
  }

  .price-box {
    padding: 12px;
    font-size: 13px;
  }
}
</style>
</head>

<body>

<div class="container">

  <!-- IMAGE -->
  <div class="image-box">
    <img id="image">
  </div>

  <!-- DETAILS -->
  <div class="details">
    <h2 id="name"></h2>

    <p id="weight"></p>
    <!-- <p id="making"></p>

    <div id="price" class="price-box"></div> -->

    <button id="whatsappBtn">💬 Enquire on WhatsApp</button>
  </div>

</div>

<!-- PRODUCT SCRIPT -->
<script type="module" src="product.js"></script>

</body>
</html>
